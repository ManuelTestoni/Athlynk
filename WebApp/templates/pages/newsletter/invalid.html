{% extends 'pages/auth/_base.html' %}

{% block auth_title %}Link non valido{% endblock %}
{% block auth_eyebrow %}Newsletter{% endblock %}

{% block auth_content %}
<div class="text-center">
    <div class="inline-flex items-center justify-center mb-6"
         style="width:64px;height:64px;background:var(--al-marble);border-radius:var(--al-r-sm);">
        <i class="ph ph-x-circle text-3xl" style="color:var(--al-danger);"></i>
    </div>
    <h1 class="al-h-1" style="font-size: clamp(22px, 3.6vw, 30px);">Link non valido</h1>
    <p class="al-body mt-3">Il link non è valido o è già stato utilizzato.</p>
    <a href="/" class="al-btn al-btn-ghost mt-8">Torna al sito</a>
</div>
{% endblock %}
