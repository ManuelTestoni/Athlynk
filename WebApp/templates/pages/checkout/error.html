<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento non completato · Athlynk</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0a08">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 4 L28 28 H23.5 L16 12 L8.5 28 H4 Z' fill='%23c9a96a'/%3E%3Crect x='11' y='21' width='10' height='2' fill='%23c9a96a'/%3E%3C/svg%3E">
<style>
  :root { --ink:#0b0a08; --ivory:#f4efe4; --ivory-mute:#9b9181; --gold:#c9a96a; --line:rgba(201,169,106,0.22); }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--ink); color:var(--ivory); font-family:'Hanken Grotesk',system-ui,sans-serif; -webkit-font-smoothing:antialiased; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:520px; text-align:center; }
  .mark { width:64px; height:64px; margin:0 auto 28px; border:1px solid rgba(197,48,48,0.40); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#e0795f; }
  .mark svg { width:28px; height:28px; }
  .eyebrow { font-size:11px; letter-spacing:0.20em; text-transform:uppercase; color:var(--gold); margin:0 0 12px; }
  h1 { font-family:'Bodoni Moda',Georgia,serif; font-weight:400; font-size:32px; line-height:1.15; margin:0 0 18px; }
  .lede { color:var(--ivory-mute); font-size:17px; line-height:1.6; max-width:46ch; margin:0 auto 36px; }
  .actions { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; justify-content:center; text-decoration:none; font-size:14px; font-weight:600; border-radius:2px; padding:13px 26px; transition:transform .18s ease; }
  .btn:hover { transform:translateY(-1px); }
  .btn-gold { background:var(--gold); color:#1a1206; }
  .btn-ghost { border:1px solid var(--line); color:var(--ivory); }
  .note { margin-top:32px; color:var(--ivory-mute); font-size:13px; line-height:1.6; }
  .note a { color:var(--gold); text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
    </div>
    <p class="eyebrow">Pagamento non completato</p>
    <h1>Qualcosa è andato storto.</h1>
    <p class="lede">Il pagamento non è andato a buon fine e nessun importo è stato addebitato. Puoi riprovare quando vuoi.</p>
    <div class="actions">
      <a href="{{ website_url }}/acquista.html" class="btn btn-gold">Riprova</a>
      <a href="{{ website_url }}" class="btn btn-ghost">Torna al sito</a>
    </div>
    <p class="note">Continua a non funzionare? Scrivici a <a href="mailto:supporto@athlynk.it">supporto@athlynk.it</a>.</p>
  </div>
</body>
</html>
