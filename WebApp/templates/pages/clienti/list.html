{% extends 'base.html' %}
{% load safejson %}

{% block title %}Atleti{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto" x-data="clientsTable({{ clients_json|json_js }}, {{ all_labels_json|json_js }})">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-8 gap-4">
        <div>
            <p class="al-eyebrow mb-3">Studio &middot; Atleti</p>
            <h1 class="al-h-1">I tuoi <span class="al-display-i">atleti</span></h1>
            <p class="al-body mt-2">
                <span class="font-medium text-ink">{{ active_count }}</span> attivi su <span class="font-medium text-ink">{{ total_count }}</span> totali
            </p>
            <div class="al-rule-bronze mt-5"></div>
        </div>
        <div>
            <a href="{% url 'clienti_registra' %}" class="al-btn">
                <i class="ph ph-user-plus text-sm"></i>
                <span>Aggiungi Atleta</span>
            </a>
        </div>
    </div>

    <!-- Search & Filters (Alpine, reattivi, nessun reload) -->
    <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-6">
        <div class="al-search sm:max-w-xs" style="flex: 0 1 320px;">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" x-model="q" placeholder="Cerca per nome o email…" class="al-input">
        </div>
        <select x-model="status" class="al-select sm:max-w-[180px]">
            <option value="">Tutti gli stati</option>
            <option value="ACTIVE">Attivi</option>
            <option value="PENDING">In attesa</option>
            <option value="INACTIVE">Inattivi</option>
        </select>
        <select x-model="plan" class="al-select sm:max-w-[220px]">
            <option value="">Tutti gli abbonamenti</option>
            {% for p in all_plans %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>
        <select x-model="labelFilter" class="al-select sm:max-w-[180px]" x-show="allLabels.length > 0" x-cloak>
            <option value="">Tutte le etichette</option>
            <template x-for="l in allLabels" :key="l.id">
                <option :value="l.id" x-text="l.name"></option>
            </template>
        </select>
        <button type="button" x-show="hasFilters" x-cloak @click="q=''; status=''; plan=''; labelFilter=''" class="al-btn al-btn-ghost al-btn-sm">
            <i class="ph ph-x"></i>
            <span>Resetta</span>
        </button>
    </div>

    <!-- Table -->
    <div class="al-card al-card-flush overflow-hidden">
        <div class="overflow-x-auto">
            <table class="al-table">
                <thead>
                    <tr>
                        <th>Atleta</th>
                        <th>Stato</th>
                        <th>Allenamento</th>
                        <th>Nutrizione</th>
                        <th>Ultimo Check</th>
                        <th>Abbonamento</th>
                        <th class="text-right">&nbsp;</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="c in filtered" :key="c.id">
                    <tr>
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="al-avatar al-avatar-sm al-avatar-sq" x-text="c.initials"></div>
                                <div>
                                    <p class="font-medium text-ink" x-text="c.name"></p>
                                    <p class="al-tag" style="font-size:9px;" x-text="c.email"></p>
                                    <div class="flex flex-wrap gap-1 mt-1" x-show="c.labels && c.labels.length > 0">
                                        <template x-for="lbl in (c.labels || [])" :key="lbl.id">
                                            <span class="al-pill" style="font-size:9px; padding: 1px 6px;" x-text="lbl.name"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <template x-if="c.status === 'ACTIVE'"><span class="al-badge al-badge-success"><span class="dot"></span>Attivo</span></template>
                            <template x-if="c.status === 'PENDING'"><span class="al-badge al-badge-warn"><span class="dot"></span>In attesa</span></template>
                            <template x-if="c.status !== 'ACTIVE' && c.status !== 'PENDING'"><span class="al-badge"><span class="dot"></span>Inattivo</span></template>
                        </td>
                        <td>
                            <template x-if="c.workout_title">
                                <div>
                                    <p class="font-medium text-ink truncate max-w-[160px]" x-text="c.workout_title"></p>
                                    <p class="al-tag" style="font-size:9px;" x-text="c.workout_level"></p>
                                </div>
                            </template>
                            <template x-if="!c.workout_title"><span class="al-tag">Nessun piano</span></template>
                        </td>
                        <td>
                            <template x-if="c.nutrition_title">
                                <p class="font-medium text-ink truncate max-w-[160px]" x-text="c.nutrition_title"></p>
                            </template>
                            <template x-if="!c.nutrition_title"><span class="al-tag">Nessun piano</span></template>
                        </td>
                        <td>
                            <template x-if="c.last_check"><span class="al-table-num" x-text="fmtDate(c.last_check)"></span></template>
                            <template x-if="!c.last_check"><span class="al-tag">Mai</span></template>
                        </td>
                        <td>
                            <template x-if="c.sub_name">
                                <div>
                                    <p class="font-medium text-ink truncate max-w-[140px]" x-text="c.sub_name"></p>
                                    <p class="text-xs text-bronze font-medium" x-text="'€' + c.sub_price"></p>
                                </div>
                            </template>
                            <template x-if="!c.sub_name"><span class="al-tag">Nessuno</span></template>
                        </td>
                        <td class="text-right">
                            <a :href="c.url" class="al-btn al-btn-ghost al-btn-sm">
                                <span>Apri</span>
                                <i class="ph ph-arrow-right text-xs"></i>
                            </a>
                        </td>
                    </tr>
                    </template>

                    <template x-if="filtered.length === 0">
                    <tr>
                        <td colspan="7">
                            <div class="al-empty">
                                <i class="ph ph-users-three al-empty-icon"></i>
                                <h3 x-text="clients.length === 0 ? 'Nessun atleta' : 'Nessun risultato'"></h3>
                                <p x-text="clients.length === 0 ? 'Aggiungi il primo atleta per iniziare.' : 'Modifica i filtri o resetta la ricerca.'"></p>
                                <template x-if="clients.length === 0">
                                    <a href="{% url 'clienti_registra' %}" class="al-btn al-btn-sm al-btn-bronze">
                                        <i class="ph ph-user-plus"></i>
                                        <span>Aggiungi Atleta</span>
                                    </a>
                                </template>
                            </div>
                        </td>
                    </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-6 py-4 border-t flex items-center justify-between" style="border-color: var(--al-rule); background: var(--al-marble-warm);"
             x-show="filtered.length > 0">
            <span class="al-tag" x-text="filtered.length + (hasFilters ? ' risultati' : ' atleti totali')"></span>
        </div>
    </div>
</div>

<script>
function clientsTable(clientsData, allLabelsData) {
    return {
        q: '',
        status: '',
        plan: '',
        labelFilter: '',
        clients: clientsData,
        allLabels: allLabelsData,
        get hasFilters() { return this.q.trim() !== '' || this.status !== '' || this.plan !== '' || this.labelFilter !== ''; },
        get filtered() {
            const q = this.q.trim().toLowerCase();
            const lf = this.labelFilter ? parseInt(this.labelFilter) : null;
            return this.clients.filter(c =>
                (!q || (c.name || '').toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q)) &&
                (!this.status || c.status === this.status) &&
                (!this.plan || c.plan_id === this.plan) &&
                (!lf || (c.label_ids || []).includes(lf))
            );
        },
        fmtDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
        }
    };
}
</script>
{% endblock %}
