{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="consent-version" content="{{ consent_version }}">
    <meta name="cookie-consent-needed" content="{{ cookie_consent_needed|yesno:'1,0' }}">
    <title>Athlynk | {% block legal_title %}Informativa{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/athlynk.css' %}">
    <link rel="stylesheet" href="{% static 'css/cookie_banner.css' %}">
    <script>
      tailwind.config = { theme: { extend: {
        colors: {
          ink:'#14110d','ink-soft':'#2a2620','ink-mute':'#5b554a','ink-line':'#8a8270',
          parchment:'#f4efe4', marble:'#ece5d6','marble-warm':'#e7dfcb', stone:'#d8cfba',
          aegean:'#1c4a52', bronze:'#8a6a3a','bronze-soft':'#a78554','bronze-light':'#c8a774',
        },
        fontFamily: { display:['"Bodoni Moda"','Georgia','serif'], sans:['Inter','system-ui','sans-serif'], mono:['"JetBrains Mono"','monospace'] }
      }}};
    </script>
</head>
<body class="font-sans text-ink" style="background: var(--al-parchment); min-height: 100vh;">
  <header style="border-bottom: 1px solid var(--al-rule);">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
      <a href="/" class="inline-flex items-center gap-2">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <path d="M16 1.5 L29 9 L29 23 L16 30.5 L3 23 L3 9 Z" stroke="#14110d" stroke-width="1"/>
          <path d="M16 7 L22 23 M16 7 L10 23 M12.5 18 H19.5" stroke="#14110d" stroke-width="1.4"/>
        </svg>
        <span class="al-display" style="font-size: 22px;">Athlynk</span>
      </a>
      <nav class="flex items-center gap-5 text-[13px]">
        <a href="{% url 'privacy' %}" class="al-link al-link-bronze">Privacy</a>
        <a href="{% url 'cookie_policy' %}" class="al-link al-link-bronze">Cookie</a>
        <a href="{% url 'cookie_preferences' %}" class="al-link al-link-bronze">Preferenze</a>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-10">
    {% block legal_content %}{% endblock %}
  </main>

  <footer style="border-top: 1px solid var(--al-rule); margin-top: 60px;">
    <div class="max-w-4xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
      <p class="al-small">© Athlynk · <span class="font-mono">{{ consent_version }}</span></p>
      <div class="flex items-center gap-4 al-small">
        <a href="{% url 'privacy' %}" class="al-link al-link-bronze">Privacy</a>
        <a href="{% url 'cookie_policy' %}" class="al-link al-link-bronze">Cookie</a>
        <a href="#" onclick="window.cookieConsent && window.cookieConsent.open(); return false;" class="al-link al-link-bronze">Gestisci preferenze</a>
      </div>
    </div>
  </footer>

  <div id="cookie-banner-root"></div>
  <script>
    window.CONSENT_VERSION = "{{ consent_version }}";
    window.COOKIE_CONSENT_NEEDED = {% if cookie_consent_needed %}true{% else %}false{% endif %};
  </script>
  <script src="{% static 'js/cookie_banner.js' %}"></script>
</body>
</html>
