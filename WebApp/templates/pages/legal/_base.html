{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="consent-version" content="{{ consent_version }}">
    <meta name="cookie-consent-needed" content="{{ cookie_consent_needed|yesno:'1,0' }}">
    <title>Athlynk | {% block legal_title %}Informativa{% endblock %}</title>

    <!-- SEO -->
    <meta name="description" content="{% block legal_description %}Informative legali di Athlynk, la piattaforma per coach e atleti.{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ SITE_URL }}{{ request.path }}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}?v=2">
    <meta property="og:site_name" content="Athlynk">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Athlynk | {% block legal_og_title %}Informative legali{% endblock %}">
    <meta property="og:url" content="{{ SITE_URL }}{{ request.path }}">
    <meta property="og:image" content="{{ SITE_URL }}{% static 'img/og-cover.png' %}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Athlynk — Il corpo è l'opera">
    <meta property="og:locale" content="it_IT">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{ SITE_URL }}{% static 'img/og-cover.png' %}">
    {% include 'partials/seo_jsonld.html' %}

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}?v={{ ASSET_VERSION }}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"
            integrity="sha384-pb6hrQvo4s23cEUFtj0CZkzGE3jyK3pj26RIupXXxhSrrcUA/Cn0lZgcCrGH0t6L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.2/src/index.js"
            integrity="sha384-J7cw2fbG1T4C5MirTVUxsZGaMfw2m0XsCgOQEqUvB1OF9VIsHWuZF1GmyVRzs7eu" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v={{ ASSET_VERSION }}">
    <link rel="stylesheet" href="{% static 'css/athlynk.css' %}?v={{ ASSET_VERSION }}">
    <link rel="stylesheet" href="{% static 'css/cookie_banner.css' %}?v={{ ASSET_VERSION }}">
</head>
<body class="font-sans text-ink" style="background: var(--al-parchment); min-height: 100vh; overflow-x: hidden;">
  <header style="border-bottom: 1px solid var(--al-rule);">
    <div class="max-w-4xl mx-auto px-5 sm:px-6 py-5 flex flex-wrap items-center justify-between gap-y-3 gap-x-4">
      <a href="/" class="inline-flex items-center gap-2">
        <span class="al-mark" style="height: 24px; color: #14110d;"></span>
        <span class="al-display" style="font-size: 22px;">Athlynk</span>
      </a>
      <nav class="flex flex-wrap items-center gap-x-4 gap-y-2 text-[13px]">
        <a href="{% url 'privacy' %}" class="al-link al-link-bronze">Privacy</a>
        <a href="{% url 'cookie_policy' %}" class="al-link al-link-bronze">Cookie</a>
        <a href="{% url 'ai_transparency' %}" class="al-link al-link-bronze">Trasparenza AI</a>
        <a href="{% url 'cookie_preferences' %}" class="al-link al-link-bronze">Preferenze</a>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-5 sm:px-6 py-10" style="overflow-wrap: anywhere;">
    {% block legal_content %}{% endblock %}
  </main>

  <footer style="border-top: 1px solid var(--al-rule); margin-top: 60px;">
    <div class="max-w-4xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3">
      <p class="al-small">© Athlynk · <span class="font-mono">{{ consent_version }}</span></p>
      <div class="flex items-center gap-4 al-small">
        <a href="{% url 'privacy' %}" class="al-link al-link-bronze">Privacy</a>
        <a href="{% url 'cookie_policy' %}" class="al-link al-link-bronze">Cookie</a>
        <a href="{% url 'ai_transparency' %}" class="al-link al-link-bronze">Trasparenza AI</a>
        <a href="#" onclick="window.cookieConsent && window.cookieConsent.open(); return false;" class="al-link al-link-bronze">Gestisci preferenze</a>
      </div>
    </div>
  </footer>

  <div id="cookie-banner-root"></div>
  <script>
    window.CONSENT_VERSION = "{{ consent_version }}";
    window.COOKIE_CONSENT_NEEDED = {% if cookie_consent_needed %}true{% else %}false{% endif %};
  </script>
  <script src="{% static 'js/cookie_banner.js' %}?v={{ ASSET_VERSION }}"></script>
</body>
</html>
