[mypy]
plugins = mypy_django_plugin.main
mypy_path = .
explicit_package_bases = True
namespace_packages = True
ignore_missing_imports = True
follow_imports = silent
; Pragmatic baseline: surface real type errors in annotated code without
; demanding annotations on every legacy def.
check_untyped_defs = False
warn_unused_ignores = True
exclude = (migrations|__pycache__)/

[mypy.plugins.django-stubs]
django_settings_module = config.settings

; mypy 2.1.0 INTERNAL ERROR parsing this file (upstream mypy bug, not ours).
[mypy-langchain.agents.middleware.todo]
follow_imports = skip
